name: CI

on:
  push:
    branches: ["master"]
    paths: ["src/**"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]
    paths: ["src/**"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3) — leave empty to skip release"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: fmt / lint / test / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Install golint
        run: go install golang.org/x/lint/golint@latest

      - name: fmt
        run: make fmt

      - name: lint
        run: make lint

      - name: test
        run: make test

      - name: build
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: go-app-${{ github.sha }}
          path: go-app
          retention-days: 7

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    permissions:
      contents: write

    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: go-app-${{ github.sha }}

      - name: Rename binary with version
        run: |
          TAG=${{ inputs.tag || github.ref_name }}
          mv go-app go-app-${TAG}-linux-amd64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: go-app-*-linux-amd64
